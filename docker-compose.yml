# dicom_viewer full stack — Server + Client + nginx + Redis + PostgreSQL
#
# Prerequisites:
#   - NVIDIA Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/)
#   - TLS certificates in ./certs/ (cert.pem, key.pem)
#   - Copy .env.example to .env and configure
#
# Usage:
#   docker compose up --build -d
#   docker compose logs -f
#   docker compose down -v

services:
  # --- C++ rendering server (GPU required) ---
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    command:
      - "--port"
      - "8080"
      - "--ws-port"
      - "8081"
      - "--redis-host"
      - "redis"
      - "--redis-port"
      - "6379"
      - "--redis-password"
      - "${REDIS_PASSWORD}"
      - "--pg-host"
      - "postgres"
      - "--pg-port"
      - "5432"
      - "--pg-database"
      - "${POSTGRES_DB:-dicom_viewer}"
      - "--pg-user"
      - "${POSTGRES_USER:-dicom_viewer}"
      - "--pg-password"
      - "${POSTGRES_PASSWORD}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - internal
    volumes:
      - dicom_data:/data/dicom
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- React SPA client ---
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - internal
    restart: unless-stopped

  # --- nginx reverse proxy with TLS ---
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./server/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    networks:
      - internal
    depends_on:
      - server
      - client
    restart: unless-stopped

  # --- Redis 7 session store ---
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- PostgreSQL 16 audit log ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dicom_viewer}
      POSTGRES_USER: ${POSTGRES_USER:-dicom_viewer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dicom_viewer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  dicom_data:
  redis_data:
  postgres_data:
